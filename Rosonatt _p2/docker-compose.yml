services:
  db_dev:
    image: postgres:16-alpine
    container_name: produtos_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: produtos_dev
    ports:
      - "5435:5432" # <-- Mapeado para 5435 no seu Windows para evitar conflitos
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d produtos_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  db_test:
    image: postgres:16-alpine
    container_name: produtos_db_test
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: produtos_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d produtos_test"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build: .
    container_name: produtos_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      # Dentro do Docker, a API continua usando a porta interna 5432 e o nome db_dev
      DATABASE_URL: postgresql://postgres:postgres@db_dev:5432/produtos_dev
      TEST_DATABASE_URL: postgresql://postgres:postgres@db_test:5432/produtos_test
      LOG_LEVEL: INFO
    depends_on:
      db_dev:
        condition: service_healthy
      db_test:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  pgdata_dev: