[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=main
    --cov=app
    --cov-report=term-missing
    --cov-fail-under=95
filterwarnings =
    ignore::DeprecationWarning

markers =
    integration: testes de integração com banco PostgreSQL real
